name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy mtgs/ cli/
        continue-on-error: true  # advisory for now; strict in Phase 4

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        env:
          APP_ENV: test
          APP_SECRET_KEY: ci-secret-key-32-chars-minimum!!
          JWT_SECRET_KEY: ci-jwt-secret-key-must-be-long-enough-32
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          AZURE_OPENAI_API_KEY: test-key
          AZURE_OPENAI_ENDPOINT: https://test.openai.azure.com
          AZURE_SEARCH_ENDPOINT: https://test.search.windows.net
          AZURE_SEARCH_API_KEY: test-key
        run: |
          pytest tests/unit/ \
            -v \
            -m unit \
            --cov=mtgs \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          APP_ENV: test
          APP_SECRET_KEY: ci-secret-key-32-chars-minimum!!
          JWT_SECRET_KEY: ci-jwt-secret-key-must-be-long-enough-32
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          AZURE_OPENAI_API_KEY: test-key
          AZURE_OPENAI_ENDPOINT: https://test.openai.azure.com
          AZURE_SEARCH_ENDPOINT: https://test.search.windows.net
          AZURE_SEARCH_API_KEY: test-key
        run: |
          pytest tests/integration/ -v -m integration -x

  # ── MCP Tool Governance Gate ─────────────────────────────────────────────────
  # Checks any modified tool definitions against the MTGS registry
  tool-governance:
    name: MCP Tool Governance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install MTGS CLI
        run: pip install -e .

      - name: Check modified tool definitions
        env:
          MTGS_API_KEY: ${{ secrets.MTGS_API_KEY }}
          MTGS_API_URL: ${{ secrets.MTGS_API_URL }}
        run: |
          # Find changed tool JSON files
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD -- 'tools/*.json' 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No tool definitions changed."
            exit 0
          fi
          FAILED=0
          for file in $CHANGED; do
            echo "Checking $file..."
            mtgs tools check --file "$file" --env prod --fail-on HIGH || FAILED=1
          done
          exit $FAILED
        continue-on-error: true  # don't block if MTGS API not configured in secrets
